<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>html5 canvas流星雨星星动画特效代码</title>
    <script>
        let context
        let arr = new Array()
        let starCount = 800
        let rains = new Array()
        let rainCount = 40

        function init() {

            let stars = document.getElementById('stars')
            windowWidth = window.innerWidth
            stars.width = windowWidth
            stars.height = window.innerHeight

            context = stars.getContext('2d')
        }

        let Star = function() {
            this.x = windowWidth * Math.random()
            this.y = 5000 * Math.random()
            this.text = '.'
            this.color = 'white'

            this.getColor = function() {
                let _r = Math.random()
                if (_r < 0.5) {
                    this.color = '#333'
                } else {
                    this.color = 'white'
                }
            }

            this.init = function() {
                this.getColor()
            }

            this.draw = function() {
                context.fillStyle = this.color
                context.fillText(this.text, this.x, this.y)
            }
        }

        window.onload = function() {
            init()

            for (let i = 0; i < starCount; i++) {
                let star = new Star()
                star.init()
                star.draw()
                arr.push(star)
            }

            for (let i = 0; i < rainCount; i++) {
                let rain = new MeteorRain()
                rain.init()
                rain.draw()
                rains.push(rain)
            }
            playStars()
            playRains()
        }

        function playStars() {
            for (let n = 0; n < starCount; n++) {
                arr[n].getColor()
                arr[n].draw()
            }
            setTimeout('playStars()', 10)
        }
        /*流星雨开始*/
        let MeteorRain = function() {
            this.x = -1
            this.y = -1
            this.length = -1
            this.angle = 30
            this.width = -1
            this.height = -1
            this.speed = 1
            this.offset_x = -1
            this.offset_y = -1
            this.alpha = 1
            this.color1 = ''
            this.color2 = ''
            /****************初始化函数********************/
            this.init = function()
            {
                this.getPos()
                this.alpha = 1
                this.getRandomColor()

                let x = Math.random() * 80 + 150
                this.length = Math.ceil(x)
                this.angle = 30
                x = Math.random() + 0.5
                this.speed = Math.ceil(x)
                let cos = Math.cos((this.angle * 3.14) / 180)
                let sin = Math.sin((this.angle * 3.14) / 180)
                this.width = this.length * cos
                this.height = this.length * sin
                this.offset_x = this.speed * cos
                this.offset_y = this.speed * sin
            }
            /**************获取随机颜色函数*****************/
            this.getRandomColor = function() {
                let a = Math.ceil(255 - 240 * Math.random())

                this.color1 = 'rgba(' + a + ',' + a + ',' + a + ',1)'

                this.color2 = 'black'
            }
            /***************重新计算流星坐标的函数******************/
            this.countPos = function()
            {

                this.x = this.x - this.offset_x
                this.y = this.y + this.offset_y
            }
            /*****************获取随机坐标的函数*****************/
            this.getPos = function()
            {

                this.x = Math.random() * window.innerWidth

                this.y = Math.random() * window.innerHeight
            }
            /****绘制流星***************************/
            this.draw = function()
            {
                context.save()
                context.beginPath()
                context.lineWidth = 1
                context.globalAlpha = this.alpha

                let line = context.createLinearGradient(
                    this.x,
                    this.y,
                    this.x + this.width,
                    this.y - this.height
                )

                line.addColorStop(0, 'white')
                line.addColorStop(0.3, this.color1)
                line.addColorStop(0.6, this.color2)
                context.strokeStyle = line

                context.moveTo(this.x, this.y)

                context.lineTo(this.x + this.width, this.y - this.height)
                context.closePath()
                context.stroke()
                context.restore()
            }
            this.move = function() {

                let x = this.x + this.width - this.offset_x
                let y = this.y - this.height
                context.clearRect(x - 3, y - 3, this.offset_x + 5, this.offset_y + 5)

                this.countPos()

                this.alpha -= 0.002

                this.draw()
            }
        }

        function playRains() {
            for (let n = 0; n < rainCount; n++) {
                let rain = rains[n]
                rain.move()
                if (rain.y > window.innerHeight) {

                    context.clearRect(
                        rain.x,
                        rain.y - rain.height,
                        rain.width,
                        rain.height
                    )
                    rains[n] = new MeteorRain()
                    rains[n].init()
                }
            }
            setTimeout('playRains()', 2)
        }
        /*流星雨结束*/
    </script>
    <style type="text/css">
        body {
            background-color: black;
        }
        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
</body>
</html>
