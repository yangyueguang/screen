<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    html,
    body {
      height: 100%;
    }
    body {
      background: #000;
    }
    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>

    let options = {
      /* Which hue should be used for the first batch of rockets? */
      startingHue: 120,
      /* How many ticks the script should wait before a new firework gets spawned, if the user is holding down his mouse button. */
      clickLimiter: 5,
      /* How fast the rockets should automatically spawn, based on ticks */
      timerInterval: 40,
      /* Show pulsing circles marking the targets? */
      showTargets: true,
      /* Rocket movement options, should be self-explanatory */
      rocketSpeed: 2,
      rocketAcceleration: 1.03,
      /* Particle movement options, should be self-explanatory */
      particleFriction: 0.95,
      particleGravity: 1,
      /* Minimum and maximum amount of particle spawns per rocket */
      particleMinCount: 25,
      particleMaxCount: 40,
      /* Minimum and maximum radius of a particle */
      particleMinRadius: 3,
      particleMaxRadius: 5
    }

    let fireworks = []
    let particles = []
    let mouse = {
      down: false,
      x: 0,
      y: 0
    }
    let currentHue = options.startingHue;
    let clickLimiterTick = 0
    let timerTick = 0
    let cntRocketsLaunched = 0

    window.requestAnimFrame = (function () {
      return window.requestAnimationFrame ||
        window.webkitRequestAnimationFrame ||
        window.mozRequestAnimationFrame ||
        function (cb) {
          window.setTimeout(callback, 1000 / 60)
        }
    })()

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function calculateDistance(p1x, p1y, p2x, p2y) {
      let xDistance = p1x - p2x;
      let yDistance = p1y - p2y;
      return Math.sqrt(Math.pow(xDistance, 2) + Math.pow(yDistance, 2))
    }

    let canvas = document.getElementById('canvas')
    let canvasCtx = canvas.getContext('2d')
    let canvasWidth = window.innerWidth
    let canvasHeight = window.innerHeight

    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    function Firework(sx, sy, tx, ty) {

      this.x = this.sx = sx;
      this.y = this.sy = sy;
      this.tx = tx;
      this.ty = ty;

      this.distanceToTarget = calculateDistance(sx, sy, tx, ty)
      this.distanceTraveled = 0

      this.coordinates = []
      this.coordinateCount = 3

      while (this.coordinateCount--) {
        this.coordinates.push([this.x, this.y])
      }

      this.angle = Math.atan2(ty - sy, tx - sx)
      this.speed = options.rocketSpeed;
      this.acceleration = options.rocketAcceleration;
      this.brightness = random(50, 80)
      this.hue = currentHue;
      this.targetRadius = 1
      this.targetDirection = false;

      cntRocketsLaunched++;
    }

    Firework.prototype.update = function (index) {

      this.coordinates.pop()
      this.coordinates.unshift([this.x, this.y])

      if (!this.targetDirection) {
        if (this.targetRadius < 8)
          this.targetRadius += 0.15;
        else
          this.targetDirection = true;
      } else {
        if (this.targetRadius > 1)
          this.targetRadius -= 0.15;
        else
          this.targetDirection = false;
      }

      this.speed *= this.acceleration;

      let vx = Math.cos(this.angle) * this.speed;
      let vy = Math.sin(this.angle) * this.speed;
      this.distanceTraveled = calculateDistance(this.sx, this.sy, this.x + vx, this.y + vy)


      if (this.distanceTraveled >= this.distanceToTarget) {
        createParticles(this.tx, this.ty)
        fireworks.splice(index, 1)
      } else {
        this.x += vx;
        this.y += vy;
      }
    }

    Firework.prototype.draw = function () {
      let lastCoordinate = this.coordinates[this.coordinates.length - 1]

      canvasCtx.beginPath()
      canvasCtx.moveTo(lastCoordinate[0], lastCoordinate[1])
      canvasCtx.lineTo(this.x, this.y)
      canvasCtx.strokeStyle = 'hsl(' + this.hue + ',100%,' + this.brightness + '%)'
      canvasCtx.stroke()

      if (options.showTargets) {
        canvasCtx.beginPath()
        canvasCtx.arc(this.tx, this.ty, this.targetRadius, 0, Math.PI * 2)
        canvasCtx.stroke()
      }
    }

    function Particle(x, y) {

      this.x = x
      this.y = y

      this.coordinates = []
      this.coordinateCount = 5;

      while (this.coordinateCount--) {
        this.coordinates.push([this.x, this.y])
      }

      this.angle = random(0, Math.PI * 2)
      this.speed = random(1, 10)

      this.friction = options.particleFriction;
      this.gravity = options.particleGravity;

      this.hue = random(currentHue - 20, currentHue + 20)
      this.brightness = random(50, 80)
      this.alpha = 1

      this.decay = random(0.01, 0.03)
    }

    Particle.prototype.update = function (index) {

      this.coordinates.pop()
      this.coordinates.unshift([this.x, this.y])

      this.speed *= this.friction;

      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed + this.gravity;

      this.alpha -= this.decay;
      if (this.alpha <= this.decay) {
        particles.splice(index, 1)
      }
    }

    Particle.prototype.draw = function () {
      let lastCoordinate = this.coordinates[this.coordinates.length - 1]
      let radius = Math.round(random(options.particleMinRadius, options.particleMaxRadius))

      let gradient = canvasCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radius)
      gradient.addColorStop(0.0, 'white')
      gradient.addColorStop(0.1, 'white')
      gradient.addColorStop(0.1, 'hsla(' + this.hue + ',100%,' + this.brightness + '%,' + this.alpha + ')')
      gradient.addColorStop(1.0, 'black')

      canvasCtx.beginPath()
      canvasCtx.fillStyle = gradient;
      canvasCtx.arc(this.x, this.y, radius, Math.PI * 2, false)
      canvasCtx.fill()
    }

    function createParticles(x, y) {
      let particleCount = Math.round(random(options.particleMinCount, options.particleMaxCount))
      while (particleCount--) {
        particles.push(new Particle(x, y))
      }
    }

    window.addEventListener('resize', function (e) {
      canvas.width = canvasWidth = window.innerWidth
      canvas.height = canvasHeight = window.innerHeight
    })

    canvas.addEventListener('mousemove', function (e) {
      e.preventDefault()
      mouse.x = e.pageX - canvas.offsetLeft;
      mouse.y = e.pageY - canvas.offsetTop;
    })
    canvas.addEventListener('mousedown', function (e) {
      e.preventDefault()
      mouse.down = true;
    })
    canvas.addEventListener('mouseup', function (e) {
      e.preventDefault()
      mouse.down = false;
    })

    function gameLoop() {

      requestAnimFrame(gameLoop)

      currentHue += 0.5;

      canvasCtx.globalCompositeOperation = 'destination-out'
      canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.5)'
      canvasCtx.fillRect(0, 0, canvasWidth, canvasHeight)
      canvasCtx.globalCompositeOperation = 'lighter'

      var i = fireworks.length;
      while (i--) {
        fireworks[i].draw()
        fireworks[i].update(i)
      }

      var i = particles.length;
      while (i--) {
        particles[i].draw()
        particles[i].update(i)
      }

      canvasCtx.fillStyle = 'white'
      canvasCtx.font = '14px Arial'
      canvasCtx.fillText('Rockets launched: ' + cntRocketsLaunched, 10, 24)

      if (timerTick >= options.timerInterval) {
        if (!mouse.down) {
          fireworks.push(new Firework(canvasWidth / 2, canvasHeight, random(0, canvasWidth), random(0, canvasHeight /
            2)))
          timerTick = 0
        }
      } else {
        timerTick++;
      }

      if (clickLimiterTick >= options.clickLimiter) {
        if (mouse.down) {
          fireworks.push(new Firework(canvasWidth / 2, canvasHeight, mouse.x, mouse.y))
          clickLimiterTick = 0
        }
      } else {
        clickLimiterTick++;
      }
    }
    window.onload = gameLoop()
  </script>
</body>
</html>
