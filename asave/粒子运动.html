<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        body{
            overflow: hidden;
        }
    </style>
</head>
<body>
    <script>

        let canvas = document.createElement("canvas")

        document.getElementsByTagName("body")[0].appendChild(canvas)

        let bg = [20, 0, 30]
        let wh = window.innerHeight

        let ctx = canvas.getContext("2d")
        let sharedloop1 = new Looper(250 + 20 * Math.random(), 60 * Math.random())
        function setup() {

            canvas.width = window.innerWidth
            canvas.height = window.innerHeight
            wh = window.innerWidth < window.innerHeight ? window.innerWidth : window.innerHeight

            ctx.translate(canvas.width / 2, canvas.height / 2)
            fill(bg, 1)
        }

        function fill(rgb, amt) {
            ctx.beginPath()
            ctx.rect(- canvas.width / 2, - canvas.height / 2, canvas.width, canvas.height)
            ctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${amt})`
            ctx.fill()
        }
        function drawCircle(x, y, r, color) {
            ctx.beginPath()
            ctx.arc(x, y, r, 0, 2 * Math.PI)
            ctx.fillStyle = color || 'white'
            ctx.fill()
            ctx.closePath()
        }
        function Particle() {

            this.loop2 = new Looper(520 + 70 * Math.random(), 140 * Math.random())
            this.loop3 = new Looper(290 + 20 * Math.random(), 140 * Math.random())
            this.history = []
            this.history_max = 40


            this.offset = Math.random()
            this.draw = function () {

                let x = (this.loop2.sin * (wh / 3 - 10) + this.loop3.cos * 120) * (sharedloop1.sinNorm / 2 + 0.5)
                let y = (this.loop2.cos * (wh / 3 - 10) + this.loop3.sin * 120) * (sharedloop1.cosNorm / 2 + 0.5)
                let r = 0.2 + 3 * this.loop3.sinNorm * this.loop3.cosNorm
                let c = `hsla(${310 + 60 * (this.loop2.cosNorm + this.offset) * this.loop3.sinNorm}, ${100}%, ${50 + 10 * this.loop3.sin}%, ${1})`
                ctx.beginPath()
                ctx.strokeStyle = c
                ctx.lineCap = 'round'
                ctx.lineWidth = r
                let tx = x
                let ty = y
                for (let i = 0; i < Math.min(this.history_max * this.loop2.cosNorm, this.history.length); i++) {
                    ctx.moveTo(tx, ty)
                    tx = this.history[i][0]
                    ty = this.history[i][1]
                    ctx.lineTo(tx, ty)
                }
                ctx.stroke()
                drawCircle(x, y, r * 2 + 3, c)
                this.loop2.update()
                this.loop3.update()
                this.history.unshift([x, y])
                if (this.history.length > this.history_max) {
                    this.history.pop()
                }
            }
        }

        let particles = []
        for (let i = 0; i < 90; i++) {
            particles.push(new Particle())
        }
        function draw() {

            fill(bg, 0.36)

            for (let i = 0; i < particles.length; i++) {
                particles[i].draw()
            }
            sharedloop1.update()

            window.requestAnimationFrame(function () { draw() })
        }


        draw()

        setup()

        window.addEventListener("resize", setup)

        function Looper(steps, start) {
            this.val = start || 0
            this.steps = steps || 100
            this.norm = this.val / this.range
            this.sin = Math.sin(this.norm * Math.PI * 2)
            this.sinNorm = (this.sin + 1) / 2
            this.cos = Math.cos(this.norm * Math.PI * 2)
            this.cosNorm = (this.cos + 1) / 2
            this.update = function () {
                this.val = (this.val + 1) % this.steps
                this.norm = this.val / this.steps
                this.sin = Math.sin(this.norm * Math.PI * 2)
                this.sinNorm = (this.sin + 1) / 2
                this.cos = Math.cos(this.norm * Math.PI * 2)
                this.cosNorm = (this.cos + 1) / 2
            }
        }
    </script>
</body>
</html>
