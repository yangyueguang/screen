<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }
        #container {
            width: 100%;
            height: 100%;
            left: 0;
            position: absolute;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<canvas id="container"></canvas>
</body>
<script>
class CanvasMap {
    constructor(canvas, callBack=null) {
        let hoverTips = document.createElement('div')
        canvas.parentNode.appendChild(hoverTips)
        this.canvas = canvas
        this.hoverTips = hoverTips
        this.canvasW = this.canvas.width
        this.canvasH = this.canvas.height
        this.geoCenterX = 0         // 地图经度中心点
        this.geoCenterY = 0         // 地图纬度中心点
        this.scale = 1              // 地图缩放系数
        this.geoData = null         // 地图geo数据信息
        this.offsetX = 0
        this.offsetY = 0            // 鼠标事件的位置信息
        this.eventType = ''         // 事件类型
        this.ctx = this.canvas.getContext('2d')
        this.options = {
            grid: {
                backgroundColor: 'transparent', // 地图背景色
            },
            geo: {
                areaCode: "100000",     // 行政单位标识
            },
            itemStyle: {
                areaColor: '#3f91f7',   // 区域颜色
                borderWidth: 1,         // 区域边框线宽度
                borderColor: "#415c7c", // 区域边框线颜色
            },
            label: {
                show: true,             // 是否显示行政单位名称
                textStyle: {
                    font: '16px Microsoft YaHei', // 字体
                    color: '#fff',      // 字体颜色
                }
            },
            tooltip: {
                style: {
                    position: 'absolute',
                    display: 'none',
                    whiteSpace: 'nowrap',
                    zIndex: '9999999',
                    transition: 'left 0.4s cubic-bezier(0.23, 1, 0.32, 1) 0s, top 0.4s cubic-bezier(0.23, 1, 0.32, 1) 0s',
                    backgroundColor: 'rgba(50, 50, 50, 0.7)',
                    borderRadius: '4px',
                    border: '0px solid rgb(51, 51, 51)',
                    color: 'rgb(255, 255, 255)',
                    font: '20px / 30px Microsoft YaHei',
                    padding: '5px',
                    left: '0px',
                    top: '0px',
                },
                markerTemplate: '<span style="display: inline-block;width:14px;height: 14px;border-radius: 50%;margin-right: 4px;background-color: #"></span>',
                show: false,
                formatter: function (param) {
                    return `${param.marker}${param.data.name}`
                }
            },
        } // 默认配置项
        this.clickInfo = null       // 点击区域相关信息
        this.hoverInfo = null       // 鼠标悬浮区域信息
        this.alreadyInit = false    // 地图是否初始化完成
        this.callBack = callBack  // 回调函数，给实例对象发送消息
        this.visitInfos = []        // 下钻信息
        this.canvas.onmousewheel = event => {
            if (!this.alreadyInit) return
            this.eventType = 'wheel'
            if (event.deltaY > 0) {
                if (this.scale > 10) {
                    this.scale -= 10
                }
            } else {
                this.scale += 10
            }
            this.drawMap()
        }
        this.canvas.onmousemove = event => {
            if (!this.alreadyInit) return
            this.hoverInfo = null
            this.offsetX = event.offsetX
            this.offsetY = event.offsetY
            this.eventType = 'mousemove'
            this.drawMap()
            if (this.hoverInfo) {
                // 处理提示信息
                this.hoverTips.innerHTML = this.options.tooltip.formatter({
                    marker: this.options.tooltip.markerTemplate.replace('#', this.options.itemStyle.areaColor),
                    color: '#fff',
                    data: { name: this.hoverInfo.properties.name, ...this.hoverInfo }
                })
                // 确定鼠标悬浮位置信息（防止重合，与鼠标着落点偏移20px）
                let tipsPosX = 0
                let tipsPosY = 0
                // 提示信息超出盒子特殊处理
                if (this.offsetX + this.hoverTips.offsetWidth + 20 > this.canvasW) {
                    tipsPosX = this.offsetX - 20 - this.hoverTips.offsetWidth
                } else {
                    tipsPosX = this.offsetX + 20
                }
                if (this.offsetY + this.hoverTips.offsetHeight + 20 > this.canvasH) {
                    tipsPosY = this.offsetY - 20 - this.hoverTips.offsetHeight
                } else {
                    tipsPosY = this.offsetY + 20
                }
                this.setStyle(this.hoverTips, { display: 'block', left: `${tipsPosX}px`, top: `${tipsPosY}px` })
            } else {
                this.setStyle(this.hoverTips, { display: 'none' })
            }
        }
        this.canvas.onclick = event => {
            if (!this.alreadyInit) return
            this.clickInfo = null
            this.offsetX = event.offsetX
            this.offsetY = event.offsetY
            this.eventType = 'click'
            this.drawMap()
            if (this.clickInfo) {
                // 未下钻到最后一级
                if (this.options.geo.areaCode !== this.clickInfo.properties.adcode) {
                    this.options.geo.areaCode = this.clickInfo.properties.adcode
                    this.visitInfos.push(this.clickInfo.properties.parent.adcode)
                    this.getGeoAreas()
                    this.callBack ? this.callBack(this.clickInfo) : ''
                }
            } else {
                let areaCode = this.visitInfos.pop()
                // 返回至初始状态
                if (areaCode) {
                    this.options.geo.areaCode = areaCode
                    this.getGeoAreas()
                    this.callBack ? this.callBack(this.clickInfo) : ''
                }
            }
        }

        this.setStyle(this.hoverTips, this.options.tooltip.style)   // 悬浮提示信息样式
        this.getGeoAreas()
    }
    getGeoAreas() {
        let request = new XMLHttpRequest()
        let areaCode = this.options.geo.areaCode.toString()
        // 阿里云地图服务-县级地图（只有边界）与其他层级接口路径稍微有出入，需特殊处理
        if (areaCode.substr(-2) === '00') {
            areaCode = `${areaCode}_full`
        }
        request.open('get', `https://geo.datav.aliyun.com/areas_v3/bound/${areaCode}.json`)
        request.send()
        request.onload = () => {
            if (request.status === 200) {
                this.geoData = JSON.parse(request.responseText)
                let N = -90, S = 90, W = 180, E = -180
                this.geoData.features.forEach(item => {
                    // 将MultiPolygon和Polygon格式的地图处理成统一数据格式
                    if (item.geometry.type === 'Polygon') {
                        item.geometry.coordinates = [item.geometry.coordinates]
                    }
                    // 取四个方向的极值
                    item.geometry.coordinates.forEach(area => {
                        area[0].forEach(elem => {
                            if (elem[0] < W) {
                                W = elem[0]
                            }
                            if (elem[0] > E) {
                                E = elem[0]
                            }
                            if (elem[1] > N) {
                                N = elem[1]
                            }
                            if (elem[1] < S) {
                                S = elem[1]
                            }
                        })
                    })
                })
                // 计算包围盒的宽高
                let width = Math.abs(E - W)
                let height = Math.abs(N - S)
                let wScale = this.canvasW / width
                let hScale = this.canvasH / height
                // 计算地图缩放系数
                this.scale = wScale > hScale ? hScale : wScale
                // 获取包围盒中心经纬度坐标
                this.geoCenterX = (E + W) / 2
                this.geoCenterY = (N + S) / 2
                this.drawMap()
            }
        }
    }
    // 分三步，清空画布、绘制地图各子区域、标注城市名称
    drawMap() {
        this.alreadyInit = false
        this.ctx.clearRect(0, 0, this.canvasW, this.canvasH)
        this.ctx.fillStyle = this.options.grid.backgroundColor  // 图表背景色
        this.ctx.fillRect(0, 0, this.canvasW, this.canvasH)
        let dataArr = this.geoData.features
        for (let i = 0; i < dataArr.length; i++) {
            let centerX = this.canvasW / 2
            let centerY = this.canvasH / 2
            dataArr[i].geometry.coordinates.forEach(area => {
                this.ctx.save()
                this.ctx.beginPath()
                this.ctx.translate(centerX, centerY)
                area[0].forEach((elem, index) => {
                    let position = this.toScreenPosition(elem[0], elem[1])
                    if (index === 0) {
                        this.ctx.moveTo(position.x, position.y)
                    } else {
                        this.ctx.lineTo(position.x, position.y)
                    }
                })
                this.ctx.closePath()
                let { areaColor, borderWidth, borderColor } = this.options.itemStyle
                this.ctx.strokeStyle = borderColor
                this.ctx.lineWidth = borderWidth
                // 将鼠标悬浮的区域设置为橘黄色
                if (this.ctx.isPointInPath(this.offsetX, this.offsetY)) {
                    this.ctx.fillStyle = 'orange'
                    if (this.eventType === 'click') {
                        this.clickInfo = dataArr[i]
                    } else if (this.eventType === 'mousemove') {
                        this.hoverInfo = dataArr[i]
                    }
                } else {
                    this.ctx.fillStyle = areaColor
                }
                this.ctx.fill()
                this.ctx.stroke()
                this.ctx.restore()
            });
        }
        if (!this.options.label.show) return
        let centerX = this.canvasW / 2
        let centerY = this.canvasH / 2
        let { font, color } = this.options.label.textStyle
        this.geoData.features.forEach(item => {
            this.ctx.save()
            this.ctx.beginPath()
            this.ctx.translate(centerX, centerY) // 将画笔移至画布的中心
            this.ctx.fillStyle = color
            this.ctx.font = font
            this.ctx.textAlign = 'center'
            this.ctx.textBaseLine = 'center'
            let x = 0, y = 0
            //  因不同的geojson文件中中心点属性信息不同，这里需要做兼容性处理
            if (item.properties.cp) {
                x = item.properties.cp[0]
                y = item.properties.cp[1]
            } else if (item.properties.centroid) {
                x = item.properties.centroid[0]
                y = item.properties.centroid[1]
            } else if (item.properties.center) {
                x = item.properties.center[0]
                y = item.properties.center[1]
            }
            let position = this.toScreenPosition(x, y)
            this.ctx.fillText(item.properties.name, position.x, position.y);
            this.ctx.restore()
        })
        this.alreadyInit = true
    }
    toScreenPosition(horizontal, vertical) {
        // 屏幕坐标系y轴与地图坐标系y轴相反，y轴坐标取反
        return {
            x: (horizontal - this.geoCenterX) * this.scale,
            y: (this.geoCenterY - vertical) * this.scale
        }
    }
    setStyle(obj, sty) {
        for (let key in sty) {
            obj.style[key] = sty[key]
        }
    }
}
</script>
<script>
    let ui = document.getElementById('container')
    ui.width = window.innerHeight * 2.2
    ui.height = window.innerHeight
    new CanvasMap(ui, (message) => { console.log(message) });
</script>
</html>
